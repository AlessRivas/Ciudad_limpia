<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil - Ciudad Limpia</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../Home/inicio.css" />
  <link rel="stylesheet" href="Usuarios-perfil.css" />
</head>
<body>
  <header class="nav">
    <div class="nav__left">
      <span class="nav__brand">Perfil de Usuario</span>
    </div>
    <nav class="nav__links"></nav>
  </header>

  <main class="perfil-page">
    <section class="perfil-card">
      <h1>Mi informacion</h1>
      <p id="profileStatus" class="status status--info" aria-live="polite">Cargando informacion...</p>

      <div class="perfil-grid">
        <div class="perfil-readonly">
          <p><strong>Email:</strong> <span id="emailTxt">-</span></p>
          <p><strong>Rol:</strong> <span id="rolTxt">-</span></p>
        </div>
      </div>

      <form id="profileForm" class="form-grid">
        <label for="nameInput">Nombre</label>
        <input id="nameInput" type="text" maxlength="80" required />

        <label for="phoneInput">Telefono</label>
        <input id="phoneInput" type="tel" maxlength="20" required />

        <label for="addressInput">Direccion</label>
        <input id="addressInput" type="text" maxlength="150" required />

        <button id="saveProfileBtn" type="submit">Guardar cambios</button>
      </form>
    </section>

    <section class="perfil-card">
      <h2>Mis reportes</h2>
      <p class="hint">Aqui puedes revisar tus reportes y solicitar seguimiento.</p>
      <div id="reportsStatus" class="status status--info">Cargando reportes...</div>
      <div id="reportsList" class="list"></div>
    </section>

    <section class="perfil-card">
      <h2>Rutas favoritas</h2>
      <div id="favoritesStatus" class="status status--info">Cargando rutas...</div>

      <div class="favorite-controls">
        <select id="routeSelect"></select>
        <button id="addFavoriteBtn" type="button">Agregar a favoritas</button>
      </div>

      <div id="favoritesList" class="list"></div>
    </section>
  </main>

  <script type="module" src="Usuarios-perfil.js"></script>
</body>
</html>
