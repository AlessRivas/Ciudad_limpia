<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Usuarios</title>
  <link rel="stylesheet" href="admin-usuarios.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <ul>
        <li><a href="admin-reportes.html">Reportes</a></li>
        <li><a href="admin-rutas.html">Rutas</a></li>
        <li class="active"><a href="admin-usuarios.html">Usuarios</a></li>
        <li><a href="admin.html">Dashboard</a></li>
        <li><a href="admin-perfil.html">Mi Perfil</a></li>
      </ul>
      <button id="logout" class="btn-logout" type="button">Cerrar sesion</button>
    </aside>

    <main class="content">
      <div class="topbar">
        <h1>Gestion de Usuarios</h1>
        <button id="btnRecargar" type="button">Recargar</button>
      </div>

      <div class="filtros">
        <input type="text" id="buscadorUsuario" placeholder="Buscar por nombre, correo o telefono...">
        <select id="filtroRol">
          <option value="Todos">Todos los roles</option>
          <option value="admin">admin</option>
          <option value="user">user</option>
        </select>
      </div>

      <div class="tabla-wrap">
        <table class="tabla-usuarios">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Telefono</th>
              <th>Rol</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usuariosBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="admin-usuarios.js"></script>
</body>
</html>
