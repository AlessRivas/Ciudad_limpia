<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Rutas</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../Home/inicio.css">
  <link rel="stylesheet" href="admin-rutas.css">
</head>
<body>
  <header class="nav">
    <div class="nav__left">
      <img src="../Imagenes/Logo.jpg" class="nav__logo" alt="Logo">
      <span class="nav__brand">Ciudad Limpia</span>
    </div>
    <nav class="nav__links"></nav>
  </header>

  <div class="admin-layout">
    <main class="content">
      <section class="admin-dropdown-wrap">
        <details class="admin-dropdown">
          <summary>Admin Panel</summary>
          <nav class="admin-dropdown__menu" aria-label="Menu admin">
            <a href="admin-reportes.html">Gestion de reportes</a>
            <a class="active" href="admin-rutas.html">Gestion de rutas</a>
            <a href="admin-usuarios.html">Gestion de usuarios</a>
          </nav>
        </details>
      </section>

      <div class="topbar">
        <h1>Gestion de Rutas</h1>
        <button id="btnRecargar" type="button">Recargar</button>
      </div>

      <section class="card form-card">
        <h3>Nueva ruta</h3>
        <form id="rutaForm" class="ruta-form">
          <input type="text" id="nombreRuta" placeholder="Nombre de la ruta" required>
          <input type="text" id="zona" placeholder="Zona o colonia" required>
          <input type="time" id="hora" required>
          <select id="dia" required>
            <option value="">Seleccionar dia</option>
            <option>Lunes</option>
            <option>Martes</option>
            <option>Miercoles</option>
            <option>Jueves</option>
            <option>Viernes</option>
            <option>Sabado</option>
            <option>Domingo</option>
          </select>
          <button type="submit" class="btn-primary">Guardar ruta</button>
        </form>
      </section>

      <div class="filtros">
        <input type="text" id="buscadorRuta" placeholder="Buscar por nombre o zona...">
        <select id="filtroDia">
          <option value="Todos">Todos los dias</option>
          <option>Lunes</option>
          <option>Martes</option>
          <option>Miercoles</option>
          <option>Jueves</option>
          <option>Viernes</option>
          <option>Sabado</option>
          <option>Domingo</option>
        </select>
      </div>

      <div class="tabla-wrap">
        <table class="tabla-rutas">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Zona</th>
              <th>Dia</th>
              <th>Hora</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="rutasBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal" id="modalEditarRuta" aria-hidden="true">
    <div class="modal-content">
      <h2>Editar Ruta</h2>
      <input type="hidden" id="editRutaId">
      <label>Nombre</label>
      <input type="text" id="editNombreRuta">
      <label>Zona</label>
      <input type="text" id="editZona">
      <label>Dia</label>
      <select id="editDia">
        <option>Lunes</option>
        <option>Martes</option>
        <option>Miercoles</option>
        <option>Jueves</option>
        <option>Viernes</option>
        <option>Sabado</option>
        <option>Domingo</option>
      </select>
      <label>Hora</label>
      <input type="time" id="editHora">
      <div class="modal-buttons">
        <button id="btnGuardarRuta" type="button">Guardar</button>
        <button id="btnCerrarRuta" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module" src="admin-rutas.js"></script>
</body>
</html>
